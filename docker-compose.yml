services:
  web:
    build:
      context: .
      dockerfile: frontend/Dockerfile
    ports:
      - "3001:3000"
    environment:
      - GROQ_API_KEY=${GROQ_API_KEY}
      - FINLIGHT_API_KEY=${FINLIGHT_API_KEY}
      - NODE_ENV=production
    volumes:
      # Optional: Mount a local JSON files directory for mock data
      - ./backend/data:/workspace/backend/data
